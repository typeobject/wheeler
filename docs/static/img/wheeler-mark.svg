<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-labelledby="title desc">
  <title id="title">Wheeler</title>
  <desc id="desc">Three spectral quantum paths orbit a central state</desc>
  <defs>
    <linearGradient id="orbitA" x1="4" y1="8" x2="43" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00A7B5"/>
      <stop offset=".48" stop-color="#7167D9"/>
      <stop offset="1" stop-color="#EC4B82"/>
    </linearGradient>
    <linearGradient id="orbitB" x1="9" y1="43" x2="40" y2="6" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E5A315"/>
      <stop offset=".55" stop-color="#EC4B82"/>
      <stop offset="1" stop-color="#00A7B5"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="21" fill="#F7F9FA" stroke="#B7C0C9"/>
  <g fill="none" stroke-width="1.8">
    <ellipse cx="24" cy="24" rx="17" ry="7.4" stroke="url(#orbitA)" transform="rotate(17 24 24)"/>
    <ellipse cx="24" cy="24" rx="17" ry="7.4" stroke="url(#orbitB)" transform="rotate(137 24 24)"/>
    <ellipse cx="24" cy="24" rx="17" ry="7.4" stroke="#65717E" stroke-opacity=".72" transform="rotate(257 24 24)"/>
  </g>
  <circle cx="24" cy="24" r="3.5" fill="#17202A"/>
  <circle cx="8.2" cy="19.1" r="2" fill="#00A7B5" stroke="#F7F9FA"/>
  <circle cx="35.8" cy="11.8" r="2" fill="#EC4B82" stroke="#F7F9FA"/>
  <circle cx="31.3" cy="39.2" r="2" fill="#E5A315" stroke="#F7F9FA"/>
</svg>
