name: Wheeler documentation site

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build with Wheeler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 26 seed
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
      - name: Set up Gradle seed
        uses: gradle/actions/setup-gradle@v4
      - name: Build verified static site
        run: ./bootstrap/gradlew -p bootstrap --no-daemon --max-workers 2 -q :tools:wheeler --args='site -o docs-site'
      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site

  deploy:
    name: Deploy verified site
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy immutable Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
