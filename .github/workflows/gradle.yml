# Verifies the quarantined Java seed and every canonical Wheeler source package.
# Java and Gradle are disposable stage-0 infrastructure; WIP-0007 owns their deletion.
name: Wheeler bootstrap CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        distribution: [temurin, zulu]

    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: ${{ matrix.distribution }}

    - name: Set up Node for Tree-sitter tests
      uses: actions/setup-node@v4
      with:
        node-version: '26'
        cache: npm
        cache-dependency-path: tree-sitter-wheeler/package-lock.json

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    - name: Build with Gradle Wrapper and test editor grammar
      run: ./bootstrap/gradlew -p bootstrap build treeSitterTest

    - name: Build the complete canonical workspace
      run: ./bootstrap/gradlew -p bootstrap -q :tools:wheeler --args='build . -o bootstrap-output'

    - name: Upload canonical bootstrap outputs
      uses: actions/upload-artifact@v4
      with:
        name: bootstrap-output-${{ matrix.distribution }}
        path: bootstrap-output
        if-no-files-found: error

  compare-bootstrap-outputs:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Download Temurin outputs
      uses: actions/download-artifact@v4
      with:
        name: bootstrap-output-temurin
        path: temurin
    - name: Download Zulu outputs
      uses: actions/download-artifact@v4
      with:
        name: bootstrap-output-zulu
        path: zulu
    - name: Require byte-identical Wheeler artifacts
      run: diff -r --no-dereference temurin zulu

  dependency-submission:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 26
      uses: actions/setup-java@v4
      with:
        java-version: '26'
        distribution: 'temurin'

    # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
    # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
    - name: Generate and submit dependency graph
      uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0
      with:
        build-root-directory: bootstrap
